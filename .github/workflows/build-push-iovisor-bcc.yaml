name: Build and push iovisor/bcc
on:
  schedule:
    # run on Monday at 7
    - cron:  '0 7 * * 1'
  workflow_dispatch:
    inputs:
      ghcr_org:
        type: string
        required: false
        default: flatcar
        description: |
          The name of the GitHub org where the docker images should be pushed.

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    strategy:
      fail-fast: true
    runs-on: ubuntu-latest
    steps:
    - name: Mantle checkout
      uses: actions/checkout@v6
      with:
        ref: main
        sparse-checkout: /other-dockerfiles/bcc/**
        sparse-checkout-cone-mode: false
        path: mantle
    - name: Sparse Gentoo checkout
      uses: actions/checkout@v6
      with:
        repository: gentoo/gentoo
        ref: master
        sparse-checkout: /dev-util/bcc/**
        sparse-checkout-cone-mode: false
        path: gentoo
    - name: Get dev-util/bcc latest version from Gentoo
      id: bcc-gentoo-version
      shell: bash
      run: |
        v=$(ls -1 gentoo/dev-util/bcc/bcc-*.ebuild | \
              sed -e 's#^.*/bcc-\(.*\)\.ebuild#\1#' | \
              sort -V -r | \
              head -n1)
        echo "Found version in Gentoo: ${v}"
        echo VERSION=${v} >>"${GITHUB_OUTPUT}"
    - name: Get latest bcc image version
      id: bcc-ghcr-version
      shell: bash
      env:
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        curl_opts=(
          --location
          --request GET
          --url https://api.github.com/orgs/flatcar/packages/container/bcc/versions
          --header "Authorization: Bearer ${TOKEN}"
          --header 'X-GitHub-Api-Version: 2022-11-28'
        )
        curl "${curl_opts[@]}" >json_output
        jq --raw-output '.[].metadata.container.tags.[]' >versions
        echo "Found versions in ghcr:"
        cat versions
        v=$(grep --invert-match --fixed-strings latest versions | sort -V -r | head -n1)
        echo VERSION=${v} >>"${GITHUB_OUTPUT}"
    - name: Compare versions
      id: compare-versions
      shell: bash
      env:
        BCC_GENTOO_VERSION: ${{ steps.bcc-gentoo-version.outputs.VERSION }}
        BCC_GHCR_VERSION: ${{ steps.bcc-ghcr-version.outputs.VERSION }}
      run: |
        do_build=''
        if [[ -z ${BCC_GENTOO_VERSION} ]]; then
          echo "No dev-util/bcc ebuilds in Gentoo?"
        elif [[ -z ${BCC_GHCR_VERSION} ]]; then
          echo "No versioned images in ghcr, building an image"
          do_build=x
        else
          greater_version=$(printf '%s\n' "${BCC_GENTOO_VERSION}" "${BCC_GHCR_VERSION}" | sort -V -r | head -n1)
          if [[ ${greater_version} != "${BCC_GHCR_VERSION}" ]]; then
            echo "Gentoo has a greater version of bcc, building an image"
            do_build=x
          else
            echo "We have latest version available in ghcr"
          fi
        fi
        echo "DO_BUILD=${do_build}" >>"${GITHUB_OUTPUT}"
    - name: Set up QEMU
      if: ${{ steps.compare-versions.outputs.DO_BUILD != '' }}
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      if: ${{ steps.compare-versions.outputs.DO_BUILD != '' }}
      uses: docker/setup-buildx-action@v3
    - name: Login to GitHub Container Registry (ghcr)
      if: ${{ steps.compare-versions.outputs.DO_BUILD != '' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push image
      if: ${{ steps.compare-versions.outputs.DO_BUILD != '' }}
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        file: ./mantle/other-dockerfiles/bcc/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/${{ inputs.ghcr_org }}/bcc:latest ghcr.io/${{ inputs.ghcr_org }}/bcc:${{ steps.bcc-ghcr-version.outputs.VERSION }}
